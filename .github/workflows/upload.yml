name: Upload Tickets Daily

on:
  schedule:
    - cron: '0 18 * * *'  # كل يوم الساعة 6 مساءً
  workflow_dispatch:       # للتشغيل اليدوي

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Download tickets.json from your PC
        run: |
          curl -o tickets.json "https://your-server.com/tickets.json"
        # أو استخدم طريقة أخرى لتحميل الملف
      
      - name: Upload with date
        run: |
          DATE=$(date +'%Y-%m-%d')
          cp tickets.json "tickets_${DATE}.json"
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add "tickets_${DATE}.json"
          git commit -m "Auto upload tickets backup for ${DATE}" || echo "No changes"
          git push
