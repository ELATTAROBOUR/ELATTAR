<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="العطار استور - نظام متكامل لإدارة محلات صيانة الموبايلات: الفواتير, المخزون, المبيعات, الصيانة, قطع الغيار">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="العطار استور">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" href="favicon.png"/>

  <title>العطار استور - نظام صيانة الموبايلات</title>
  <link rel="manifest" href="manifest.json">

  <!-- Web Serial Printer Bridge (ESC/POS direct USB printing) -->
  <script src="js/printer_bridge.js"></script>

  <!-- Passkeys Web SDK stub (required by supabase_flutter passkeys plugin) -->
  <script>
    if (typeof window.PasskeyAuthenticator === 'undefined') {
      window.PasskeyAuthenticator = {
        init: function() { console.log('[Passkeys Stub] Initialized'); }
      };
    }
  </script>

  <style>
    /* ── ELATTAR Loading Screen ── */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #060B14;
      overflow: hidden;
      /* Mobile touch improvements */
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    /* Prevent iOS zoom on input focus */
    input, select, textarea {
      font-size: 16px !important;
    }

    #elattar-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #060B14 0%, #0B1323 50%, #080E1A 100%);
      z-index: 99999;
      transition: opacity 0.6s ease;
    }

    #elattar-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #elattar-loader .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
      object-fit: cover;
    }

    #elattar-loader .app-name {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    #elattar-loader .app-subtitle {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #7A8A9A;
      letter-spacing: 0.5px;
      margin-bottom: 32px;
    }

    #elattar-loader .loader-bar-track {
      width: 200px;
      height: 3px;
      background-color: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    #elattar-loader .loader-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #D4AF37, #E8C84A, #D4AF37);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: loading-progress 1.8s ease-in-out infinite, shimmer 2s linear infinite;
    }

    @keyframes loading-progress {
      0%   { width: 0%; }
      50%  { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .flt-loader-hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- ELATTAR Custom Loading Screen -->
  <div id="elattar-loader">
    <img class="logo" src="icons/app_logo.jpg" alt="العطار استور">
    <div class="app-name">العطار استور</div>
    <div class="app-subtitle">نظام صيانة الموبايلات</div>
    <div class="loader-bar-track">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <script>
    // ── Hide custom loader once Flutter takes over ──
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('elattar-loader');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function () { loader.remove(); }, 800);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
